name: Scheduled & Manual
on:
  schedule:
    - cron: '0 0 * * 1'    # Hər Bazar ertəsi saat 00:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Hansı mühitdə işləsin?'
        type: choice
        options: [dev, staging, prod]
        default: dev
      message:
        description: 'Bura bir mesaj yazın'
        required: false
        default: "Salam, GitHub Actions!"

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - name: Print context
        run: |
          echo "Hadisə: $GITHUB_EVENT_NAME"
          echo "Seçilən mühit: ${{ inputs.environment }}"
          echo "Mesajımız: ${{ inputs.message }}"
